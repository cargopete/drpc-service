type Indexer @entity(immutable: false) {
  " Provider address (hex string) "
  id: ID!
  address: Bytes!
  endpoint: String!
  geoHash: String!
  " Address that receives collected GRT fees "
  paymentsDestination: Bytes!
  registered: Boolean!
  registeredAt: BigInt!
  deregisteredAt: BigInt
  chains: [ChainRegistration!]! @derivedFrom(field: "indexer")
}

type ChainRegistration @entity(immutable: false) {
  " {provider}-{chainId}-{tier} "
  id: ID!
  indexer: Indexer!
  chainId: BigInt!
  " 0=Standard 1=Archive 2=Debug 3=WebSocket "
  tier: Int!
  endpoint: String!
  active: Boolean!
  startedAt: BigInt!
  stoppedAt: BigInt
}

type SupportedChain @entity(immutable: false) {
  " EIP-155 chainId as string "
  id: ID!
  chainId: BigInt!
  enabled: Boolean!
  minProvisionTokens: BigInt!
  updatedAt: BigInt!
}

" Protocol-level aggregate stats — singleton, id is always '1' "
type Protocol @entity(immutable: false) {
  id: ID!
  " Total number of ever-registered providers "
  totalIndexers: Int!
  " Total active chain/tier registrations across all providers "
  totalActiveRegistrations: Int!
  " Current minimum thawing period enforced by governance (seconds) "
  minThawingPeriod: BigInt!
  updatedAt: BigInt!
}
