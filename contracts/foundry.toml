[profile.default]
src     = "src"
out     = "out"
libs    = ["lib"]
test    = "test"
script  = "script"
solc    = "0.8.27"

[profile.default.optimizer]
enabled = true
runs    = 200

remappings = [
    # After: forge install graphprotocol/contracts
    "@graphprotocol/horizon/=lib/contracts/packages/horizon/contracts/",
    "@graphprotocol/subgraph-service/=lib/contracts/packages/subgraph-service/contracts/",
    # Standard deps (pulled transitively by graphprotocol/contracts)
    "@openzeppelin/contracts/=lib/openzeppelin-contracts/contracts/",
    "@openzeppelin/contracts-upgradeable/=lib/openzeppelin-contracts-upgradeable/contracts/",
]

[rpc_endpoints]
arbitrum_one    = "${ARBITRUM_RPC_URL}"
arbitrum_sepolia = "${ARBITRUM_SEPOLIA_RPC_URL}"

[etherscan]
arbitrum_one     = { key = "${ARBISCAN_API_KEY}", url = "https://api.arbiscan.io/api" }
arbitrum_sepolia = { key = "${ARBISCAN_API_KEY}", url = "https://api-sepolia.arbiscan.io/api" }
