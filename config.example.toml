[server]
host = "0.0.0.0"
port = 7700

[indexer]
service_provider_address = "0xYOUR_INDEXER_ADDRESS"
# 32-byte operator private key — used only for response attestations, not fund management
operator_private_key = "0xYOUR_OPERATOR_PRIVATE_KEY"

[tap]
# RPCDataService contract address (Arbitrum One)
data_service_address = "0xA983b18B8291F0c317Ba4Fe0dc0f7cc9373AF078"

# Ethereum addresses authorised to issue TAP receipts to this service.
# Derived from the gateway's signer_private_key.
authorized_senders = [
    "0xYOUR_GATEWAY_SIGNER_ADDRESS",
]

# EIP-712 domain for GraphTallyCollector — must match the deployed contract
eip712_domain_name = "GraphTallyCollector"
eip712_chain_id = 42161                                       # Arbitrum One
eip712_verifying_contract = "0x8f69F5C07477Ac46FBc491B1E6D91E2bb0111A9e"

# Reject receipts older than this (nanoseconds)
max_receipt_age_ns = 30_000_000_000  # 30 seconds

# Internal URL of your dispatch-gateway (for RAV aggregation).
# Omit this field to disable automatic RAV aggregation.
aggregator_url = "http://dispatch-gateway:8080"

# How often to aggregate receipts into RAVs (default: 60s).
# aggregation_interval_secs = 60

[database]
url = "postgres://dispatch:dispatch@localhost:5432/dispatch"

[chains]
supported = [1, 42161, 10, 8453]

# Map chain_id (string) → backend Ethereum client URL
[chains.backends]
"1"     = "http://localhost:8545"   # Ethereum mainnet (Geth/Erigon/Reth)
"42161" = "http://localhost:8546"   # Arbitrum One
"10"    = "http://localhost:8547"   # Optimism
"8453"  = "http://localhost:8548"   # Base

# On-chain RAV collection. Omit this section entirely to disable collect().
[collector]
arbitrum_rpc_url      = "https://arb1.arbitrum.io/rpc"
collect_interval_secs = 3600   # collect GRT every hour
# min_collect_value = 0        # skip collect if value is below this (GRT wei)
