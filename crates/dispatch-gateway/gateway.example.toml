[gateway]
host = "0.0.0.0"
port = 8080
# Geographic region of this gateway. Providers in the same region receive a
# score bonus (see [qos].region_bonus) before latency probes establish a ranking.
# Suggested values: "us-east", "us-west", "eu-west", "eu-central", "ap-southeast"
# region = "eu-west"

[tap]
# Gateway operator private key — signs TAP receipts sent to indexers.
# This is NOT a fund-controlling key; it is an authorised signer added to
# PaymentsEscrow by the gateway operator account.
signer_private_key = "0xYOUR_SIGNER_PRIVATE_KEY"

# RPCDataService contract address (set after deployment)
data_service_address = "0x0000000000000000000000000000000000000000"

# GRT wei charged per compute unit.
# Default = 4e-6 GRT/CU (4_000_000_000_000 / 1e18). At $0.09/GRT: $0.36/M CUs per provider.
# Effective consumer cost is 3× (gateway dispatches to 3 providers concurrently):
#   eth_blockNumber ( 1 CU): $1.08/M calls   (Alchemy: $4.50/M)
#   eth_getBalance  ( 5 CU): $5.40/M calls   (Alchemy: $4.50/M)
#   eth_call        (10 CU): $10.80/M calls  (Alchemy: $11.70/M)
#   eth_getLogs     (20 CU): $21.60/M calls  (Alchemy: $33.75/M)
# Break-even vs Alchemy on eth_call at ~$0.10/GRT. See config.rs pricing_math test.
base_price_per_cu = 4_000_000_000_000

eip712_domain_name = "TAP"
eip712_chain_id = 42161
eip712_verifying_contract = "0x8f69F5C07477Ac46FBc491B1E6D91E2be0111A9e"

[qos]
probe_interval_secs = 10
latency_weight      = 0.30
availability_weight = 0.30
freshness_weight    = 0.25
concurrent_k        = 3     # Dispatch to top-3 providers; first response wins
# Score bonus for providers in the same region as this gateway.
# 0.15 means a same-region provider gets +15pp weight before latency data exists.
region_bonus        = 0.15

# Static provider list.
# Dynamic discovery: configure [discovery] below to pull from the RPC subgraph.
[[providers]]
address      = "0xYOUR_INDEXER_1_ADDRESS"
endpoint     = "https://rpc1.example.com"
chains       = [1, 42161, 10, 8453]
region       = "eu-west"
capabilities = ["standard"]

[[providers]]
address      = "0xYOUR_INDEXER_2_ADDRESS"
endpoint     = "https://rpc2.example.com"
chains       = [1, 42161]
region       = "us-east"
# Global capability shorthand — same tiers applied to all chains:
# capabilities = ["standard", "archive", "debug"]
#
# Per-chain override (takes precedence over global `capabilities` when non-empty).
# Use when a provider has different tiers on different chains — e.g. archive on
# Ethereum but standard-only on Arbitrum:
# [providers.chain_capabilities]
# 1     = ["standard", "archive"]
# 42161 = ["standard"]
